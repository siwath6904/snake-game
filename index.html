<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game - ตะมุมิน้อย 60FPS</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1e1e24;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            flex-direction: column;
            touch-action: manipulation;
            overflow: hidden;
        }
        h1 {
            margin-top: 5px;
            margin-bottom: 2px;
            color: #ff79c6;
            font-size: 1.6em;
            text-shadow: 0 0 10px rgba(255, 121, 198, 0.5);
        }
        .cute-badge {
            background: linear-gradient(135deg, #ff79c6, #bd93f9);
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 121, 198, 0.4);
            margin-bottom: 12px;
            animation: floating 2s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        canvas {
            background-color: #282a36;
            border: 6px solid #44475a;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            max-width: 88vw;
            max-height: 88vw;
        }
        .control-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            width: 170px;
            height: 170px;
            margin-top: 15px;
        }
        .control-btn {
            background-color: rgba(255, 121, 198, 0.1);
            border: 2px solid #ff79c6;
            border-radius: 50%;
            color: #ff79c6;
            font-size: 1.3em;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .control-btn:active {
            background-color: #ff79c6;
            color: white;
            transform: scale(0.92);
        }
        #up-btn { grid-column: 2; grid-row: 1; }
        #left-btn { grid-column: 1; grid-row: 2; }
        #right-btn { grid-column: 3; grid-row: 2; }
        #down-btn { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <h1>✨ Snake Game ✨</h1>
    <div class="cute-badge">🌸 ตะมุมิน้อย 60 FPS 🌸</div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <div class="control-container">
        <div id="up-btn" class="control-btn" onclick="setDirection('UP')">⬆️</div>
        <div id="left-btn" class="control-btn" onclick="setDirection('LEFT')">⬅️</div>
        <div id="right-btn" class="control-btn" onclick="setDirection('RIGHT')">➡️</div>
        <div id="down-btn" class="control-btn" onclick="setDirection('DOWN')">⬇️</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        let snake = [
            {x: 240, y: 240},
            {x: 220, y: 240},
            {x: 200, y: 240}
        ];

        let dx = gridSize;
        let dy = 0;
        let foodX;
        let foodY;
        let score = 0;
        let changingDirection = false;
        let particles = [];

        // ตัวแปรควบคุมเวลาสำหรับระบบ 60 FPS
        let lastSnakeUpdateTime = 0;
        const snakeMoveInterval = 130; // ความเร็วงู (มิลลิวินาทีต่อช่อง) ช้าลงนิดนึงตามต้องการเพื่อความตะมุตะมิ

        createFood();
        
        // เริ่มต้นลูปเกมแบบลื่นไหล 60 FPS
        requestAnimationFrame(main);

        function main(timestamp) {
            if (hasGameEnded()) {
                alert("🎉 Game Over น้าาา! ตะมุมิน้อยทำคะแนนได้: " + score + " คะแนน");
                document.location.reload();
                return;
            }

            // สั่งให้ลูปทำงานต่อเนื่องที่ 60 FPS
            requestAnimationFrame(main);

            // เคลียร์หน้าจอและวาดเอฟเฟกต์ดาวแบบเนียนตา (ลื่นไหล 60เฟรม/วินาที)
            clearCanvas();
            drawFood();
            drawParticles();

            // ตรวจสอบว่าถึงเวลาที่งูต้องขยับหรือยัง
            if (timestamp - lastSnakeUpdateTime >= snakeMoveInterval) {
                advanceSnake();
                changingDirection = false;
                lastSnakeUpdateTime = timestamp;
            }

            // วาดตัวงูลงบนจอ
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#282a36";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach(drawSnakePart);
        }

        function drawSnakePart(snakePart, index) {
            const radius = gridSize / 2;
            const centerX = snakePart.x + radius;
            const centerY = snakePart.y + radius;

            ctx.beginPath();
            if (index === 0) {
                ctx.fillStyle = "#50fa7b";
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fill();

                let eyeX1, eyeY1, eyeX2, eyeY2;
                if (dx > 0) {
                    eyeX1 = centerX + 4; eyeY1 = centerY - 4; eyeX2 = centerX + 4; eyeY2 = centerY + 4;
                } else if (dx < 0) {
                    eyeX1 = centerX - 4; eyeY1 = centerY - 4; eyeX2 = centerX - 4; eyeY2 = centerY + 4;
                } else if (dy > 0) {
                    eyeX1 = centerX - 4; eyeY1 = centerY + 4; eyeX2 = centerX + 4; eyeY2 = centerY + 4;
                } else {
                    eyeX1 = centerX - 4; eyeY1 = centerY - 4; eyeX2 = centerX + 4; eyeY2 = centerY - 4;
                }

                ctx.fillStyle = "#ffffff";
                ctx.beginPath(); ctx.arc(eyeX1, eyeY1, 3, 0, 2 * Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeX2, eyeY2, 3, 0, 2 * Math.PI); ctx.fill();

                ctx.fillStyle = "#000000";
                ctx.beginPath(); ctx.arc(eyeX1, eyeY1, 1.5, 0, 2 * Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeX2, eyeY2, 1.5, 0, 2 * Math.PI); ctx.fill();
            } else {
                ctx.fillStyle = index % 2 === 0 ? "#ff79c6" : "#8be9fd";
                ctx.arc(centerX, centerY, radius - 1, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
            if (didEatFood) {
                score += 10;
                createParticles(foodX, foodY);
                createFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            const radius = gridSize / 2;
            const centerX = foodX + radius;
            const centerY = foodY + radius;

            ctx.beginPath();
            ctx.fillStyle = "#ff5555";
            ctx.arc(centerX, centerY, radius - 2, 0, 2 * Math.PI);
            ctx.fill();

            ctx.beginPath();
            ctx.strokeStyle = "#50fa7b";
            ctx.lineWidth = 2;
            ctx.moveTo(centerX, centerY - radius + 2);
            ctx.lineTo(centerX + 3, centerY - radius - 2);
            ctx.stroke();
        }

        // ปรับแต่งเอฟเฟกต์สะเก็ดดาวให้กระจายตัวและจางลงอย่างนุ่มนวลที่ระดับ 60 FPS
        function createParticles(x, y) {
            const colors = ["#ff79c6", "#ffb86c", "#f1fa8c", "#8be9fd"];
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x + gridSize / 2,
                    y: y + gridSize / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    radius: Math.random() * 2.5 + 1,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1
                });
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02; // ค่อยๆ จางลงทีละเฟรมในระบบ 60 FPS

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.fillStyle = p.color;
                    ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;
            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        function randomTen(min, max) {
            return Math.round((Math.random() * (max - min) + min) / gridSize) * gridSize;
        }

        function createFood() {
            foodX = randomTen(0, canvas.width - gridSize);
            foodY = randomTen(0, canvas.height - gridSize);
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x == foodX && part.y == foodY) createFood();
            });
        }

        function setDirection(direction) {
            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (direction === 'LEFT' && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
            if (direction === 'UP' && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
            if (direction === 'RIGHT' && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
            if (direction === 'DOWN' && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
        }

        function changeDirection(event) {
            const LEFT_KEY = 37, A_KEY = 65;
            const RIGHT_KEY = 39, D_KEY = 68;
            const UP_KEY = 38, W_KEY = 87;
            const DOWN_KEY = 40, S_KEY = 83;

            const keyPressed = event.keyCode;

            if (keyPressed === LEFT_KEY || keyPressed === A_KEY) setDirection('LEFT');
            if (keyPressed === UP_KEY || keyPressed === W_KEY) setDirection('UP');
            if (keyPressed === RIGHT_KEY || keyPressed === D_KEY) setDirection('RIGHT');
            if (keyPressed === DOWN_KEY || keyPressed === S_KEY) setDirection('DOWN');
        }

        document.addEventListener("keydown", changeDirection);
    </script>
</body>
</html>
