<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game Mobile</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            flex-direction: column;
            touch-action: manipulation; /* ป้องกันการซูมด้วยการแตะซ้ำ */
            overflow: hidden; /* ป้องกันการเลื่อนหน้าจอ */
        }
        h1 {
            margin-top: 10px;
            margin-bottom: 5px;
            color: #4CAF50;
            font-size: 1.5em; /* ปรับขนาดตัวอักษรสำหรับมือถือ */
        }
        canvas {
            background-color: #2c3e50;
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90vw; /* กว้างสุด 90% ของหน้าจอ */
            max-height: 90vw; /* ให้คงรูปทรงสี่เหลี่ยมจัตุรัสบนมือถือ */
        }
        /* --- ส่วนควบคุมทิศทางบนหน้าจอ --- */
        .control-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 คอลัมน์ */
            grid-template-rows: repeat(3, 1fr); /* 3 แถว */
            gap: 5px; /* ระยะห่างระหว่างปุ่ม */
            width: 180px;
            height: 180px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .control-btn {
            background-color: rgba(76, 175, 80, 0.2); /* สีเขียวโปร่งแสง */
            border: 2px solid #4CAF50;
            border-radius: 12px;
            color: #4CAF50;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none; /* ป้องกันการเลือกตัวอักษร */
            transition: background-color 0.1s;
            -webkit-tap-highlight-color: transparent; /* เอาแถบไฮไลต์สีฟ้าเริ่มต้นออก */
        }
        .control-btn:active {
            background-color: rgba(76, 175, 80, 0.5); /* สีเขียวเข้มขึ้นเมื่อกด */
        }
        /* กำหนดตำแหน่งปุ่มในกริด */
        #up-btn { grid-column: 2; grid-row: 1; }
        #left-btn { grid-column: 1; grid-row: 2; }
        #right-btn { grid-column: 3; grid-row: 2; }
        #down-btn { grid-column: 2; grid-row: 3; }

    </style>
</head>
<body>

    <h1>Snake Game Mobile</h1>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- --- ส่วนคอนเทนเนอร์ปุ่มควบคุม --- -->
    <div class="control-container">
        <div id="up-btn" class="control-btn" onclick="setDirection('UP')">⬆️</div>
        <div id="left-btn" class="control-btn" onclick="setDirection('LEFT')">⬅️</div>
        <div id="right-btn" class="control-btn" onclick="setDirection('RIGHT')">➡️</div>
        <div id="down-btn" class="control-btn" onclick="setDirection('DOWN')">⬇️</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // กำหนดขนาดของแต่ละช่องในกริด
        const gridSize = 20;
        
        // จุดเริ่มต้นของงู
        let snake = [
            {x: 200, y: 200},
            {x: 180, y: 200},
            {x: 160, y: 200}
        ];

        // ความเร็วและทิศทางเริ่มต้น (เดินไปทางขวา)
        let dx = gridSize;
        let dy = 0;
        
        let foodX;
        let foodY;
        let score = 0;
        let changingDirection = false;

        // เริ่มเกม
        createFood();
        main();

        // ฟังก์ชันลูปหลักของเกม
        function main() {
            if (hasGameEnded()) {
                alert("Game Over! คะแนนของตะมุมิน้อยคือ: " + score);
                document.location.reload(); // รีเฟรชหน้าจอเพื่อเริ่มใหม่
                return;
            }

            changingDirection = false;
            
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // ปรับตัวเลขนี้เพื่อเปลี่ยนความเร็วเกม (ยิ่งน้อยยิ่งเร็ว)
        }

        // เคลียร์หน้าจอ
        function clearCanvas() {
            ctx.fillStyle = "#2c3e50";
            ctx.strokeStyle = "#34495e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        // วาดตัวงู
        function drawSnake() {
            snake.forEach(drawSnakePart);
        }

        function drawSnakePart(snakePart) {
            ctx.fillStyle = "#4CAF50";
            ctx.strokeStyle = "#2E7D32";
            ctx.fillRect(snakePart.x, snakePart.y, gridSize, gridSize);
            ctx.strokeRect(snakePart.x, snakePart.y, gridSize, gridSize);
        }

        // คำนวณการเคลื่อนที่
        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head); // เพิ่มส่วนหัวใหม่เข้าไป

            const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
            if (didEatFood) {
                score += 10;
                createFood(); // สร้างอาหารชิ้นใหม่ (ไม่ต้องลบหาง)
            } else {
                snake.pop(); // ลบหางออกถ้าย้ายที่แล้วไม่ได้กินอาหาร
            }
        }

        // สุ่มตำแหน่งอาหาร
        function randomTen(min, max) {
            return Math.round((Math.random() * (max - min) + min) / gridSize) * gridSize;
        }

        function createFood() {
            foodX = randomTen(0, canvas.width - gridSize);
            foodY = randomTen(0, canvas.height - gridSize);
            
            // ป้องกันไม่ให้อาหารเกิดทับตัวงู
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x == foodX && part.y == foodY) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.strokeStyle = "#c0392b";
            ctx.fillRect(foodX, foodY, gridSize, gridSize);
            ctx.strokeRect(foodX, foodY, gridSize, gridSize);
        }

        // เช็คการชน
        function hasGameEnded() {
            // ชนตัวเอง
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            // ชนกำแพง
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;
            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // ฟังก์ชันส่วนกลางสำหรับการตั้งทิศทางใหม่ (ป้องกันการกดสวนทิศเดิม)
        function setDirection(direction) {
            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (direction === 'LEFT' && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (direction === 'UP' && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if (direction === 'RIGHT' && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (direction === 'DOWN' && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }

        // ควบคุมทิศทาง (Keyboard support - ยังคงไว้สำหรับการเล่นข้ามแพลตฟอร์ม)
        function changeDirection(event) {
            const LEFT_KEY = 37, A_KEY = 65;
            const RIGHT_KEY = 39, D_KEY = 68;
            const UP_KEY = 38, W_KEY = 87;
            const DOWN_KEY = 40, S_KEY = 83;

            const keyPressed = event.keyCode;

            if (keyPressed === LEFT_KEY || keyPressed === A_KEY) {
                setDirection('LEFT');
            }
            if (keyPressed === UP_KEY || keyPressed === W_KEY) {
                setDirection('UP');
            }
            if (keyPressed === RIGHT_KEY || keyPressed === D_KEY) {
                setDirection('RIGHT');
            }
            if (keyPressed === DOWN_KEY || keyPressed === S_KEY) {
                setDirection('DOWN');
            }
        }

        document.addEventListener("keydown", changeDirection);
    </script>

</body>
</html>
